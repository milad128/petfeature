{% extends "base.html" %}

{% block content %}
<nav class="breadcrumb">
  <a href="{{ url_for('library') }}">کتابخانه</a>
  <span>/</span>
  <span>{{ slug }}</span>
</nav>

{% if book %}
<h1>{{ book.title }}</h1>
<p class="meta">نویسنده: {{ book.author }}</p>
<div class="book-body">{{ book.body | safe }}</div>
{% else %}
<h1>جزئیات کتاب</h1>
<p class="placeholder">صفحه کتاب «{{ slug }}» — محتوا بعداً از دیتابیس بارگذاری می‌شود.</p>
{% endif %}
{% endblock %}
